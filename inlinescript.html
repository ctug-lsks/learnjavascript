<html>
    <head>
         <meta charset='utf-8'>
         <title>Tiêu đề trang</title>
    </head>
    <body>
        <h1>Đây là tiêu đề</h1>
        <form>
            <h3>Select Color:</h3>
            <input type="radio" id="yellow" name="color" value="yellow"
            onclick="div_result.style.backgroundColor='yellow'">
            <label for="yellow">Yellow</label><br>
            <input type="radio" id="green" name="color" value="green"
            onclick="div_result.style.backgroundColor='green'">
            <label for="green">Green</label><br>
            <div id="div_result" style="background-color: lightgray; width: 200px; height: 100px; margin-top: 10px;">

            </div>
        </form>
    </body>
</html>
