<html>
    <head>
        <meta charset='utf-8'>
        <title>Tiêu đề trang</title>
        <script type="text/javascript">
            function xuLyCong(a, b) 
            {
                kq=eval(a) + eval(b);
                alert("Kết quả: " + kq);
            }
        </script>
    </head>
    <body>
        <table>
            <tr>
                <td>Hệ số a:</td>
                <td>
                    <input type="text" id="a">
                </td>
            </tr>
            <tr>
                <td>Hệ số b:</td>
                <td>
                    <input type="text" id="b">
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    <input type="button" value="Cộng 2 số"
                    onclick="xuLyCong(a.value, b.value)">
                </td>
            </tr>
        </table>
    </body>
</html>
